services:
  postgres:
    image: postgres:16-alpine
    container_name: talleres_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talleres_electronicos
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talleres_electronicos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: talleres_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/talleres_electronicos?schema=public
      APP_DATABASE_URL: postgresql://talleres_app:talleres_app_local_unsafe_change_me@postgres:5432/talleres_electronicos?schema=public
      DB_APP_USER: talleres_app
      DB_APP_PASSWORD: talleres_app_local_unsafe_change_me
      NODE_ENV: production
      JWT_SECRET: desarrollo-plataforma-talleres-electronicos-cambie-en-produccion
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: http://localhost:5173
      FRONTEND_URLS: http://localhost:5173
      PUBLIC_FRONTEND_URL: http://localhost:5173
      PORT: 3000
      PUPPETEER_SKIP_DOWNLOAD: "true"
      CHROME_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      - "3000:3000"
    volumes:
      - whatsapp_session:/app/.wwebjs_auth

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    container_name: talleres_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  whatsapp_session:
